<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | Light Bearers</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- HEADER -->
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <span class="logo">🌟 Light Bearers</span>
        </div>

        <nav class="primary-nav">
          <ul class="nav-list">
            <li><a class="nav-link" href="/index.html">Home</a></li>
          </ul>
        </nav>
      </div>

      <p class="site-tagline">
        Empowering Students for Social, Economic, and Academic Growth
      </p>
    </header>

    <!-- MAIN -->
    <main class="container">
      <section>
        <h2>Register as a Member</h2>

        <form id="member-form" class="member-form">

          <div class="form-row">
            <label for="fullName">Full Name *</label>
            <input id="fullName" name="fullName" type="text" required />
          </div>

          <div class="form-row">
            <label for="email">Email *</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div class="form-row">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" />
          </div>

          <div class="form-row">
            <label for="ageRange">Age Range *</label>
            <select id="ageRange" name="ageRange" required>
              <option value="" disabled selected>Select...</option>
              <option value="Under 18">Under 18</option>
              <option value="18-24">18-24</option>
              <option value="25-34">25-34</option>
              <option value="35-44">35-44</option>
              <option value="45+">45+</option>
            </select>
          </div>

          <div class="form-row">
            <label for="county">County *</label>
            <input id="county" name="county" type="text" required />
          </div>

          <div class="form-row">
            <label for="country">Country</label>
            <input id="country" name="country" type="text" value="Kenya" />
          </div>

          <div class="form-row">
            <label for="chapter">Chapter</label>
            <input id="chapter" name="chapter" type="text" />
          </div>

          <button type="submit" class="program-btn">
            Submit Registration
          </button>

          <p id="member-message" role="status" aria-live="polite"></p>
        </form>

        <p class="muted">
          Prefer Google Form instead?
          <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSdgOBRrP2HYg1IHde9UxKfZ6kkGZG0kPNM3iFpMVJlLjceHQA/viewform"
            target="_blank"
            rel="noopener noreferrer">
            Open the Google Form
          </a>
        </p>

      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2025 Light Bearers. All Rights Reserved.</p>
    </footer>

  </div>

  <!-- 🔥 FORM LOGIC -->
  <script>
    const form = document.getElementById("member-form");
    const message = document.getElementById("member-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.textContent = "Submitting...";

      const data = {
        fullName: form.fullName.value,
        email: form.email.value,
        phone: form.phone.value,
        ageRange: form.ageRange.value,
        county: form.county.value,
        country: form.country.value,
        chapter: form.chapter.value,
        source: "website"
      };

      try {
        const res = await fetch("/api/members", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(data),
        });

        const result = await res.json();

        if (res.ok) {
          message.style.color = "green";
          message.textContent = "✅ Registration successful!";
          form.reset();
        } else {
          message.style.color = "red";
          message.textContent = result.error || "Registration failed.";
        }

      } catch (error) {
        console.error(error);
        message.style.color = "red";
        message.textContent = "❌ Network error. Try again.";
      }
    });
  </script>

</body>
</html>
