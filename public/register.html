<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | Light Bearers</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- HEADER -->
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <span class="logo">🌟 Light Bearers</span>
        </div>

        <nav class="primary-nav">
          <ul class="nav-list">
            <li><a class="nav-link" href="/index.html">Home</a></li>
          </ul>
        </nav>
      </div>

      <p class="site-tagline">
        Empowering Students for Social, Economic, and Academic Growth
      </p>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
      <section>
        <h2>Register as a Member</h2>

        <form id="member-form" class="member-form">

          <div class="form-row">
            <label for="fullName">Full Name *</label>
            <input id="fullName" type="text" required />
          </div>

          <div class="form-row">
            <label for="email">Email *</label>
            <input id="email" type="email" required />
          </div>

          <div class="form-row">
            <label for="phone">Phone</label>
            <input id="phone" type="tel" />
          </div>

          <div class="form-row">
            <label for="ageRange">Age Range *</label>
            <select id="ageRange" required>
              <option value="" disabled selected>Select...</option>
              <option value="Under 18">Under 18</option>
              <option value="18-24">18-24</option>
              <option value="25-34">25-34</option>
              <option value="35-44">35-44</option>
              <option value="45+">45+</option>
            </select>
          </div>

          <div class="form-row">
            <label for="county">County *</label>
            <input id="county" type="text" required />
          </div>

          <div class="form-row">
            <label for="country">Country</label>
            <input id="country" type="text" value="Kenya" />
          </div>

          <div class="form-row">
            <label for="chapter">Chapter</label>
            <input id="chapter" type="text" />
          </div>

          <button type="submit" class="program-btn">
            Submit Registration
          </button>

          <p id="member-message" role="status" aria-live="polite"></p>
        </form>

        <!-- Google Form fallback -->
        <p class="muted">
          Prefer Google Form instead?
          <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSdgOBRrP2HYg1IHde9UxKfZ6kkGZG0kPNM3iFpMVJlLjceHQA/viewform"
            target="_blank"
            rel="noopener noreferrer">
            Open the Google Form
          </a>
        </p>

      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <p>&copy; 2025 Light Bearers. All Rights Reserved.</p>
    </footer>

  </div>

  <script src="./js/index.js"></script>
</body>
</html>
